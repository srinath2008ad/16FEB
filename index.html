<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="score">
        <div id="score-card">
            <h2 id="points">0</h2>
            <h2>-</h2>
            <h2 id="wickets">0</h2>
            <h3 id="overs">(<p id="overcount"></p>.<p id="overballs"></p>)</h3>
        </div>
        <div id="strikers">
            <div>
                <p id="striker1"></p>(<span id="st1_score"></span>)
                in <span id="st1_balls">0</span>
                <span id="strike1">*</span>
            </div>
            <div>
                <p id="striker2"></p>(<span id="st2_score"></span>)
                in <span id="st2_balls">0</span>
                <span id="strike2">*</span>
            </div>
        </div>
    </div>
    <div id="scoreline">
        <h4>Score Line:</h4>
        <h4 id="scores"></h4>
    </div>
    <div id="scorebuttons">
        <button onclick="addscore('(.)')">DOT</button>
        <button onclick="addscore(1)">1</button>
        <button onclick="addscore(2)">2</button>
        <button onclick="addscore(3)">3</button>
        <button onclick="addscore(4)">4</button>
        <button onclick="addscore(5)">5</button>
        <button onclick="addscore(6)">6</button>
        <button onclick="addscore('W')">W</button>
        <button onclick="addscore('1wd')">Wide</button>
        <button onclick="addscore('1nb')">noball</button>
    </div>
    <div id="matchsummary">
        
    </div>
    <script src="script.js"></script>
</body>

</html>
